services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_ai"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyzer
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    restart: unless-stopped

  dashboard-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    restart: unless-stopped

  dashboard-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard-ui
    ports:
      - "${DASHBOARD_UI_PORT:-3001}:3000"
    depends_on:
      - dashboard-api
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
